<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>チャットボット</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f0f2f5;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .chat-container {
      width: 100%;
      max-width: 640px;
      height: 90vh;
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.1);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .chat-header {
      background: #1a73e8;
      color: #fff;
      padding: 16px 20px;
      font-size: 1.1rem;
      font-weight: 600;
    }

    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .message {
      max-width: 80%;
      padding: 10px 14px;
      border-radius: 18px;
      font-size: 0.95rem;
      line-height: 1.5;
      word-break: break-word;
    }

    .message.ai {
      background: #f1f3f4;
      color: #333;
      align-self: flex-start;
      border-bottom-left-radius: 4px;
    }

    .message.user {
      background: #1a73e8;
      color: #fff;
      align-self: flex-end;
      border-bottom-right-radius: 4px;
    }

    .message.loading {
      background: #f1f3f4;
      color: #999;
      align-self: flex-start;
      border-bottom-left-radius: 4px;
      font-style: italic;
    }

    .message.error {
      background: #fdecea;
      color: #c62828;
      align-self: flex-start;
      border-bottom-left-radius: 4px;
    }

    .chat-input-area {
      border-top: 1px solid #e0e0e0;
      padding: 12px 16px;
      display: flex;
      gap: 8px;
      align-items: flex-end;
      background: #fff;
    }

    .input-wrapper {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    textarea {
      width: 100%;
      padding: 10px 14px;
      border: 1px solid #ddd;
      border-radius: 20px;
      font-size: 0.95rem;
      resize: none;
      outline: none;
      line-height: 1.4;
      max-height: 100px;
      font-family: inherit;
      transition: border-color 0.2s;
    }

    textarea:focus { border-color: #1a73e8; }

    .char-count {
      font-size: 0.75rem;
      color: #999;
      text-align: right;
      padding-right: 14px;
    }

    .char-count.over { color: #c62828; }

    button {
      background: #1a73e8;
      color: #fff;
      border: none;
      border-radius: 50%;
      width: 44px;
      height: 44px;
      font-size: 1.1rem;
      cursor: pointer;
      flex-shrink: 0;
      transition: background 0.2s, opacity 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    button:hover:not(:disabled) { background: #1557b0; }
    button:disabled { opacity: 0.4; cursor: not-allowed; }
  </style>
</head>
<body>
  <div class="chat-container">
    <div class="chat-header">💬 チャットボット</div>
    <div class="chat-messages" id="messages">
      <div class="message ai">こんにちは！何でも聞いてください。</div>
    </div>
    <div class="chat-input-area">
      <div class="input-wrapper">
        <textarea
          id="input"
          placeholder="メッセージを入力... (最大200文字)"
          rows="1"
          maxlength="200"
        ></textarea>
        <div class="char-count" id="charCount">0 / 200</div>
      </div>
      <button id="sendBtn" title="送信">&#9658;</button>
    </div>
  </div>

  <script>
    const messagesEl = document.getElementById('messages');
    const inputEl = document.getElementById('input');
    const sendBtn = document.getElementById('sendBtn');
    const charCountEl = document.getElementById('charCount');

    // 文字数カウント
    inputEl.addEventListener('input', () => {
      const len = inputEl.value.length;
      charCountEl.textContent = `${len} / 200`;
      charCountEl.classList.toggle('over', len >= 200);
      sendBtn.disabled = len === 0 || len > 200;
    });

    // Enter で送信（Shift+Enter で改行、IME変換中は送信しない）
    inputEl.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey && !e.isComposing) {
        e.preventDefault();
        send();
      }
    });

    sendBtn.addEventListener('click', send);

    function addMessage(text, type) {
      const el = document.createElement('div');
      el.className = `message ${type}`;
      el.textContent = text;
      messagesEl.appendChild(el);
      messagesEl.scrollTop = messagesEl.scrollHeight;
      return el;
    }

    async function send() {
      const message = inputEl.value.trim();
      if (!message || message.length > 200) return;

      // 送信中は入力・ボタンを無効化
      inputEl.disabled = true;
      sendBtn.disabled = true;
      inputEl.value = '';
      charCountEl.textContent = '0 / 200';
      charCountEl.classList.remove('over');

      addMessage(message, 'user');
      const loadingEl = addMessage('入力中...', 'loading');

      try {
        const res = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message }),
        });

        const data = await res.json();
        loadingEl.remove();

        if (!res.ok) {
          addMessage(data.error || 'エラーが発生しました。', 'error');
        } else {
          addMessage(data.reply, 'ai');
        }
      } catch (err) {
        loadingEl.remove();
        addMessage('通信エラーが発生しました。', 'error');
      } finally {
        inputEl.disabled = false;
        sendBtn.disabled = false;
        inputEl.focus();
      }
    }
  </script>
</body>
</html>
